services:
  # Backend API
  - type: web
    name: smartsearch-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_CODE
        value: ADMIN2026
      - key: PORT
        value: 10000
    healthCheckPath: /health

  # Frontend Static Site
  - type: web
    name: smartsearch-frontend
    env: static
    buildCommand: echo "Frontend ready"
    staticPublishPath: ./frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: smartsearch-backend
          envVarKey: RENDER_EXTERNAL_URL
