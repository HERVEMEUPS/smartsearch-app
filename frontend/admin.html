<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=dashboard.html">
    <title>Redirection...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .redirect-message {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="redirect-message">
        <h1>🔄 Redirection en cours...</h1>
        <div class="spinner"></div>
        <p>Vous allez être redirigé vers le dashboard administrateur</p>
        <p><a href="dashboard.html" style="color: white; text-decoration: underline;">Cliquez ici si la redirection ne fonctionne pas</a></p>
    </div>

    <script>
        // Redirection JavaScript en backup
        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 500);
    </script>
</body>
</html>
