version: '3.8'

services:
  # Base de données MongoDB
  mongodb:
    image: mongo:7.0
    container_name: oufarez-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: oufarez2026
      MONGO_INITDB_DATABASE: documents_perdus
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - oufarez-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Node.js
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oufarez-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://admin:oufarez2026@mongodb:27017/documents_perdus?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-changez-moi-en-production}
      ADMIN_CODE: ${ADMIN_CODE:-ADMIN2026}
      AI_SERVICE_URL: http://ai-service:8000
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      mongodb:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
    networks:
      - oufarez-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Service IA Python/FastAPI
  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: oufarez-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-claude-3-5-sonnet-20241022}
      MATCH_THRESHOLD: ${MATCH_THRESHOLD:-0.72}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    volumes:
      - ./apps/ai-service/app:/app/app
      - ai_cache:/app/cache
    networks:
      - oufarez-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React (optionnel, pour dev)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: oufarez-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./apps/web/src:/app/src
    networks:
      - oufarez-network
    depends_on:
      - api

# Volumes persistants
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  ai_cache:
    driver: local

# Réseau interne
networks:
  oufarez-network:
    driver: bridge
